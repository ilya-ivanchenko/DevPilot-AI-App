spring:
  application:
    name: 'devpilot-ai'
  r2dbc:
    url: 'r2dbc:postgresql://localhost:5432/devpilot'
    username: 'devpilot'
    password: 'devpilot'
  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8080

logging:
  level:
    root: INFO
    com.example: INFO
    org.springframework.web.reactive.function.client: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %5p [%15.15t] %-40.40logger{39} : %m%n"

telegram:
  token: ${TELEGRAM_BOT_TOKEN:}
  polling-interval: 3s

llm:
  api-key: ${OPENAI_API_KEY:}
  base-url: 'https://api.openai.com'
  model: 'gpt-4o-mini'
  timeout: 60s
  prompts:
    review-system: "You are a code reviewer. Analyze the code or diff provided. Focus on: bugs, style, security, complexity, and suggest improvements. Reply in the same language as the code comments or in English. Be concise."

app:
  messages:
    review-empty: "Send code or a public GitHub PR link after /review. Example: /review https://github.com/owner/repo/pull/123"
    review-public-only: "Only public GitHub repositories are supported. Private repos are not supported."
    review-error: "Review failed. Please try again or check the link/code."
    review-timeout: "Request timed out. Try a smaller snippet or PR."
